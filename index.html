<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GemAI - لوحة التحكم الذكية</title>

    <style>
      /* نظام ألوان متكيف للتحميل قبل تحميل ملفات CSS الخارجية */
      :root {
        --bg-color: #ffffff;
        --accent-color: #21e09a;
        --loading-reflect: rgba(255, 255, 255, 0.7);
      }

      html.dark {
        --bg-color: #0f172a; /* يتطابق مع OKLCH الذي صممناه */
        --loading-reflect: rgba(15, 23, 42, 0.7);
      }

      body, html {
        padding: 0;
        margin: 0;
        background-color: var(--bg-color);
        transition: background-color 0.3s ease;
        overflow-x: hidden;
      }

      #global-loading {
        position: fixed;
        top: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        background-color: var(--bg-color);
        z-index: 9999;
      }

      .loading-container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        overflow: hidden;
      }

      /* شعار SVG مع نبض هادئ */
      .loading-logo {
        width: 110px;
        height: auto;
        animation: pulse 2s infinite ease-in-out;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.95); opacity: 0.8; }
      }

      /* المستطيل اللامع المطوّر */
      .rect {
        position: absolute;
        top: 0;
        width: 80px;
        height: 100%;
        background: linear-gradient(90deg, transparent 0%, var(--loading-reflect) 50%, transparent 100%);
        filter: blur(8px);
        transform: skewX(-30deg);
        animation: slide 1.5s infinite linear;
      }

      @keyframes slide {
        0% { transform: translateX(-150%) skewX(-30deg); }
        100% { transform: translateX(250%) skewX(-30deg); }
      }

      /* إخفاء التحميل عند بدء التطبيق */
      .loader-hidden {
        opacity: 0;
        visibility: hidden;
        transition: all 0.5s ease;
      }
    </style>

    <script>
      if (localStorage.getItem('theme') === 'dark' || 
          (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
